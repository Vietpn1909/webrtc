<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Audio Hub - DeepFilterNet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #00d2ff;
        --secondary: #3a7bd5;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
      }
      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .container {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 500px;
        width: 90%;
      }
      h1 {
        margin-bottom: 0.5rem;
        font-weight: 600;
        background: linear-gradient(to right, #00d2ff, #3a7bd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      .btn-group {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 2rem;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(to right, #00d2ff, #3a7bd5);
        color: white;
        border: none;
        border-radius: 12px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
      }
      button:active {
        transform: translateY(0);
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
        box-shadow: none;
      }

      #status {
        margin-top: 20px;
        font-size: 14px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        color: #38bdf8;
      }
      .error {
        color: #f87171 !important;
        background: rgba(248, 113, 113, 0.1) !important;
      }

      .pulse {
        width: 12px;
        height: 12px;
        background: #22c55e;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        animation: pulse-animation 2s infinite;
      }
      @keyframes pulse-animation {
        0% {
          box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.7);
        }
        100% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>AI Audio Hub</h1>
      <p>Hệ thống bộ đàm khử vọng sử dụng DeepFilterNet 3</p>

      <div class="btn-group">
        <button id="btnUser1">Tôi là Người 1</button>
        <button id="btnUser2">Tôi là Người 2</button>
      </div>

      <div id="status">Sẵn sàng kết nối...</div>
    </div>

    <audio id="audioOutput" autoplay></audio>

    <script>
      const audioEl = document.getElementById("audioOutput");
      const statusEl = document.getElementById("status");
      const btns = [
        document.getElementById("btnUser1"),
        document.getElementById("btnUser2"),
      ];
      let pc = null;

      async function startCall(role) {
        try {
          btns.forEach((b) => (b.disabled = true));
          statusEl.innerText = "🔍 Đang tìm thiết bị micro...";
          statusEl.classList.remove("error");

          if (pc) {
            pc.close();
          }

          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          // 1. Yêu cầu Micro (Tối ưu cho lọc nhiễu phần cứng trước khi qua AI)
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              channelCount: 1,
            },
          });

          console.log("Đã nhận stream micro.");
          stream.getTracks().forEach((track) => pc.addTrack(track, stream));

          // 2. Xử lý nhận luồng từ Server
          pc.ontrack = (evt) => {
            console.log("Nhận track từ server:", evt.track.kind);
            if (evt.track.kind === "audio") {
              // Tạo stream mới từ track nhận được để đảm bảo tính ổn định
              const remoteStream = new MediaStream([evt.track]);
              audioEl.srcObject = remoteStream;

              // Ép trình duyệt phát âm thanh
              audioEl
                .play()
                .catch((e) =>
                  console.warn("Autoplay bị chặn, chờ tương tác:", e),
                );

              statusEl.innerHTML = `<span class="pulse"></span> Đã kết nối: <strong>${role}</strong>`;
            }
          };

          // 3. Theo dõi trạng thái kết nối
          pc.oniceconnectionstatechange = () => {
            console.log("ICE Connection State:", pc.iceConnectionState);
            if (
              pc.iceConnectionState === "disconnected" ||
              pc.iceConnectionState === "failed"
            ) {
              statusEl.innerText = "❌ Mất kết nối mạng.";
              btns.forEach((b) => (b.disabled = false));
            }
          };

          // 4. Trao đổi SDP
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          const response = await fetch("/offer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sdp: pc.localDescription.sdp,
              type: pc.localDescription.type,
              role: role,
            }),
          });

          if (!response.ok) throw new Error("Server không phản hồi.");

          const answer = await response.json();
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          console.log("Cuộc gọi đã thiết lập thành công.");
        } catch (err) {
          console.error(err);
          statusEl.innerText = "⚠️ Lỗi: " + err.message;
          statusEl.classList.add("error");
          btns.forEach((b) => (b.disabled = false));
        }
      }

      document.getElementById("btnUser1").onclick = () => startCall("user1");
      document.getElementById("btnUser2").onclick = () => startCall("user2");
    </script>
  </body>
</html>
