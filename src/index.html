<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bộ đàm AI - DeepFilterNet</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <h1>Phòng Liên Lạc Bộ Đàm AI</h1>
    <p>Mở 2 tab trình duyệt. Một tab chọn Người 1, tab kia chọn Người 2.</p>
    
    <button id="btnUser1">Đóng vai Người 1</button>
    <button id="btnUser2">Đóng vai Người 2</button>
    
    <div id="status">Chưa kết nối...</div>
    <audio id="audioOutput" autoplay></audio>

    <script>
        const audioEl = document.getElementById('audioOutput');
        const statusEl = document.getElementById('status');
        let pc = new RTCPeerConnection();

        async function startCall(role) {
            statusEl.innerText = "Đang cấu hình micro...";
            
            // Bật AEC3 của trình duyệt, Tắt lọc ồn mặc định để nhường cho DeepFilterNet
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false }
            });
            
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            pc.addEventListener('track', (evt) => {
                if (evt.track.kind === 'audio') {
                    audioEl.srcObject = evt.streams[0];
                    statusEl.innerText = `Đã kết nối thành công với tư cách: ${role}`;
                }
            });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const response = await fetch('/offer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type,
                    role: role 
                })
            });

            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        }

        document.getElementById('btnUser1').onclick = () => startCall('user1');
        document.getElementById('btnUser2').onclick = () => startCall('user2');
    </script>
</body>
</html>
